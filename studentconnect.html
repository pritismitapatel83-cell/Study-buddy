<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Connect | Study Buddy</title>
    <link rel="stylesheet" href="studentconnect.css">
</head>
<body>

<div class="chat-container">

    <!-- LEFT PANEL -->
    <aside class="sidebar">
        <h2>💬 Student Connect</h2>

        <div class="user">
            <img src="profile2.jpeg">
            <span>Rahul (BCA)</span>
        </div>

        <div class="user active">
            <img src="profile1.jpeg">
            <span>Anita (BCA)</span>
        </div>

        <div class="user">
            <img src="profile4.jpeg">
            <span>Amit (BCA)</span>
        </div>
    </aside>

    <!-- CHAT AREA -->
    <section class="chat-area">

        <div class="chat-header">
            <img src="profile1.jpeg">
            <h3>Anita</h3>
        </div>

        <div class="messages" id="messages">
            <div class="message received">
                Hi! Have you completed DBMS notes?
            </div>

            <div class="message sent">
                Yes, I finished Unit-3 today 🙂
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </section>

</div>

<script src="studentconnect.js"></script>
</body>
</html>
